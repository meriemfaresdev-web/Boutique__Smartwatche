<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique de Smartwatches</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-img-top { height: 180px; object-fit: contain; padding: 10px; }
    </style>
</head>
<body class="bg-light">

<div class="container my-5">
    <h2 class="text-center mb-5">Nos Smartwatches</h2>
    <div id="watchContainer" class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="mName">Nom du produit</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center">
                <img id="mImage" src="" class="img-fluid mb-3" style="max-height: 250px;">
                <h4 id="mPrice" class="text-success"></h4>
                <p id="mWater" class="badge rounded-pill"></p>
                <hr>
                <p>ID Produit: <span id="mId" class="fw-bold"></span></p>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
$(document).ready(function() {
    let allWatches = []; // Variable bach n-stockiw fiha l-data

    $.ajax({
        url: 'https://corsproxy.io/?' + encodeURIComponent('https://apiyes.net/WatchAPI/readAll.php'),
        method: 'GET',
        success: function(response) {
            allWatches = (typeof response === 'string') ? JSON.parse(response) : response;
            let container = $('#watchContainer');
            container.empty();

            $.each(allWatches, function(index, watch) {
                let cardHTML = `
                    <div class="col">
                        <div class="card shadow-sm h-100 p-2">
                            <img src="${watch.imageURL}" class="card-img-top" onerror="this.src='https://via.placeholder.com/150'">
                            <div class="card-body text-center">
                                <h6 class="card-title">${watch.name}</h6>
                                <button onclick="showDetails(${watch.id})" class="btn btn-sm btn-primary mt-2">Détails</button>
                            </div>
                        </div>
                    </div>
                `;
                container.append(cardHTML);
            });
        }
    });

    // Fonction bach n-affichiw les détails
    window.showDetails = function(id) {
        // N-qalbo 3la l-montre li 3andha had l-id
        let watch = allWatches.find(w => w.id == id);

        if (watch) {
            // N-3ammrou l-Modal b l-ma3loumat
            $('#mName').text(watch.name);
            $('#mPrice').text(watch.price + " $");
            $('#mImage').attr('src', watch.imageURL);
            $('#mId').text(watch.id);

            // Check l-étanchéité
            if(watch.isWaterResistant) {
                $('#mWater').text("Résistant à l'eau").removeClass('bg-danger').addClass('bg-success');
            } else {
                $('#mWater').text("Non résistant").removeClass('bg-success').addClass('bg-danger');
            }

            // N-biyno l-Modal
            var myModal = new bootstrap.Modal(document.getElementById('detailModal'));
            myModal.show();
        }
    };
});
</script>

</body>
</html>
