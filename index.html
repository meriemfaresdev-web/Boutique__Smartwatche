<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique de Smartwatches</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { height: 100%; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-img-top { height: 200px; object-fit: contain; padding: 15px; background: #f8f9fa; }
        .badge-water { position: absolute; top: 10px; right: 10px; }
    </style>
</head>
<body class="bg-light">

<div class="container my-5">
    <h2 class="text-center mb-5">Nos Smartwatches</h2>
    
    <div id="watchContainer" class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        <div class="text-center w-100">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Chargement des produits...</p>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
$(document).ready(function() {
    $.ajax({
        url: 'https://corsproxy.io/?' + encodeURIComponent('https://apiyes.net/WatchAPI/readAll.php'),
        method: 'GET',
        success: function(response) {
            let watches = (typeof response === 'string') ? JSON.parse(response) : response;
            let container = $('#watchContainer');
            container.empty(); 

            $.each(watches, function(index, watch) {
                let waterBadge = watch.isWaterResistant 
                    ? '<span class="badge bg-info badge-water">Waterproof</span>' 
                    : '';

                let cardHTML = `
                    <div class="col">
                        <div class="card shadow-sm h-100">
                            ${waterBadge}
                            <img src="${watch.imageURL}" class="card-img-top" alt="${watch.name}" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">${watch.name}</h5>
                                <p class="card-text text-success fw-bold fs-5">${watch.price} $</p>
                                <div class="mt-auto">
                                    <button class="btn btn-outline-primary w-100">Détails</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.append(cardHTML);
            });
        },
        error: function() {
            $('#watchContainer').html('<div class="alert alert-danger w-100 text-center">Erreur de chargement des données.</div>');
        }
    });
});
</script>

</body>
</html>
