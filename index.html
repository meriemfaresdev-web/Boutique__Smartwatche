<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chercher par ID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .id-item { cursor: pointer; transition: 0.2s; border: 1px solid #ddd; border-radius: 5px; margin: 5px; padding: 10px; display: inline-block; width: 80px; text-align: center; background: white; }
        .id-item:hover { background-color: #0d6efd; color: white; transform: scale(1.1); }
        #detailCard { display: none; }
        .id-container { max-height: 300px; overflow-y: auto; padding: 10px; border: 1px solid #eee; border-radius: 10px; background: #fff; }
    </style>
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="row">
        <div class="col-md-5">
            <div class="card p-4 shadow-sm h-100">
                <h4 class="mb-3 text-primary">Liste des IDs</h4>
                <p class="text-muted small">Cliquez sur un ID pour voir les détails :</p>
                <div id="idList" class="id-container text-center">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div id="detailCard" class="card shadow p-4 h-100">
                <div class="text-center">
                    <img id="mImage" src="" class="img-fluid mb-3" style="max-height: 250px; border-radius: 10px;">
                    <h3 id="mName" class="text-dark"></h3>
                    <h4 id="mPrice" class="text-success fw-bold"></h4>
                    <div id="mWater" class="badge rounded-pill p-2 mb-3"></div>
                    <hr>
                    <p class="text-muted">ID Produit: <span id="mId" class="badge bg-secondary"></span></p>
                </div>
            </div>
            <div id="noSelection" class="alert alert-info text-center h-100 d-flex align-items-center justify-content-center">
                Veuillez cliquer sur un ID pour afficher les détails de la montre.
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
$(document).ready(function() {
    let allWatches = []; 

    $.ajax({
        url: 'https://corsproxy.io/?' + encodeURIComponent('https://apiyes.net/WatchAPI/readAll.php'),
        method: 'GET',
        success: function(response) {
            allWatches = (typeof response === 'string') ? JSON.parse(response) : response;
            let listContainer = $('#idList');
            listContainer.empty();

            $.each(allWatches, function(index, watch) {
                listContainer.append(`<div class="id-item shadow-sm fw-bold" onclick="showInfo(${watch.id})">${watch.id}</div>`);
            });
        }
    });

    window.showInfo = function(id) {
        let watch = allWatches.find(w => w.id == id);

        if (watch) {
            $('#mName').text(watch.name);
            $('#mPrice').text(watch.price + " $");
            $('#mImage').attr('src', watch.imageURL).attr('onerror', "this.src='https://via.placeholder.com/200?text=No+Image'");
            $('#mId').text(watch.id);

            if(watch.isWaterResistant) {
                $('#mWater').text("Résistant à l'eau").removeClass('bg-danger').addClass('bg-info');
            } else {
                $('#mWater').text("Non résistant").removeClass('bg-info').addClass('bg-danger');
            }

            $('#noSelection').hide();
            $('#detailCard').fadeIn();
        }
    };
});
</script>

</body>
</html>
